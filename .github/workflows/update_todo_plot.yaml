name: Update TODO Scatter Plot

on:
  push:
    paths:
      - 'TODO.md'          # 当 TODO 文件变化时触发
  workflow_dispatch:       # 也支持手动触发

jobs:
  plot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyecharts

      - name: Generate scatter plot
        run: python scripts/plot_todos.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-update TODO scatter plot"
          file_pattern: "todos_scatter.png"